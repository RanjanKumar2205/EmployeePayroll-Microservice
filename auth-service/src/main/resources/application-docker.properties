# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8085

# ── DataSource ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/auth_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${DB_TIMEZONE:Asia/Kolkata}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── JPA ────────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Flyway ─────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ── Admin seed ─────────────────────────────────────────────────────────────────
app.admin.username=${ADMIN_USERNAME}
app.admin.password=${ADMIN_PASSWORD}

# ── Eureka ─────────────────────────────────────────────────────────────────────
eureka.instance.hostname=auth-service
eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-server:8761/eureka/}

# ── Actuator ───────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
