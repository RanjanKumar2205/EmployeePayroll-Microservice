# ── Server ──────────────────────────────────────────────────────────────────────
server.port=8090

# ── Eureka ──────────────────────────────────────────────────────────────────────
eureka.instance.hostname=spring-cloud-gateway
eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-server:8761/eureka/}

# ── JWKS ────────────────────────────────────────────────────────────────────────
gateway.jwks-uri=${AUTH_SERVICE_URL:http://auth-service:8085}/api/v1/auth/.well-known/jwks.json

# ── Public paths — bypass JWT validation ────────────────────────────────────────
gateway.public-paths=/api/auth/register,/api/auth/login,/api/auth/.well-known,/actuator/health,/actuator/info

# ── Routes ──────────────────────────────────────────────────────────────────────
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RewritePath=/api/auth/(?<segment>.*), /api/v1/auth/${segment}

spring.cloud.gateway.server.webflux.routes[1].id=user-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=RewritePath=/api/users/(?<segment>.*), /api/v1/users/${segment}

spring.cloud.gateway.server.webflux.routes[2].id=employee-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://employee-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/employees/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=RewritePath=/api/employees(?<segment>/?.*), /api/v1/employees${segment}

spring.cloud.gateway.server.webflux.routes[3].id=salary-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://salary-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/salary/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=RewritePath=/api/salary(?<segment>/?.*), /api/v1/salaries${segment}

spring.cloud.gateway.server.webflux.routes[4].id=notification-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://notification-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=RewritePath=/api/notifications/(?<segment>.*), /api/v1/notifications/${segment}

# ── Actuator ────────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
