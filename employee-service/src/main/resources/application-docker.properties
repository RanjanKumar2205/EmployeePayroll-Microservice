server.port=8081

spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/employee_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${DB_TIMEZONE:Asia/Kolkata}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

eureka.instance.hostname=employee-service
eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-server:8761/eureka/}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

# Distributed tracing
management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=${ZIPKIN_URL:http://zipkin:9411}/api/v2/spans
