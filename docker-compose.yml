services:

  # ─── Infrastructure ───────────────────────────────────────────────────────────

  zipkin:
    image: openzipkin/zipkin:${TAG:-latest}
    container_name: zipkin
    ports:
      - "9411:9411"

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3307:${DB_PORT}"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_DATABASE: employee_service
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "${DB_HOST:-mysql}", "-u", "${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    container_name: redis-server
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  # ─── Application Services ─────────────────────────────────────────────────────

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: ${PROFILE}
    healthcheck:
      test: ["CMD", "curl", "-f", "${PROTOCOL}://eureka-server:${EUREKA_PORT}${HEALTH_PATH}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: ${PROFILE}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_TIMEZONE: ${DB_TIMEZONE:-Asia/Kolkata}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      EUREKA_URL: http://eureka-server:8761/eureka/
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "${PROTOCOL}://auth-service:${AUTH_PORT}${HEALTH_PATH}"]
      interval: 20s
      timeout: 5s
      retries: 15

  spring-cloud-gateway:
    build:
      context: ./spring-cloud-gateway
      dockerfile: Dockerfile
    container_name: spring-cloud-gateway
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: ${PROFILE}
      EUREKA_URL: http://eureka-server:8761/eureka/
      AUTH_SERVICE_URL: http://auth-service:${AUTH_PORT:-8085}
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      eureka-server:
        condition: service_healthy
      zipkin:
        condition: service_started
      auth-service:
        condition: service_healthy

  employee-service:
    build:
      context: ./employee-service
      dockerfile: Dockerfile
    container_name: employee-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${PROFILE}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_TIMEZONE: ${DB_TIMEZONE:-Asia/Kolkata}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_healthy
      zipkin:
        condition: service_started

  salary-service:
    build:
      context: ./salary-service
      dockerfile: Dockerfile
    container_name: salary-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${PROFILE}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_TIMEZONE: ${DB_TIMEZONE:-Asia/Kolkata}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_URL: http://eureka-server:8761/eureka/
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      zipkin:
        condition: service_started

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ${PROFILE}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_TIMEZONE: ${DB_TIMEZONE:-Asia/Kolkata}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_healthy
      zipkin:
        condition: service_started

volumes:
  mysql-data:
