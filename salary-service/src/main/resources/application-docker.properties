server.port=8082

spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/salary_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${DB_TIMEZONE:Asia/Kolkata}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

eureka.instance.hostname=salary-service
eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-server:8761/eureka/}

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.employee-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.employee-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.employee-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.employee-service.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.employee-service.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.employee-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.employee-service.record-exceptions=java.lang.Exception

# Retry
resilience4j.retry.instances.employee-service.max-attempts=3

# Distributed tracing
management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=${ZIPKIN_URL:http://zipkin:9411}/api/v2/spans
